# Platform adapt config: CSDN (blog.csdn.net)
#
# CSDN renders standard Markdown; heading levels usually do not need
# adjustment.  The main cleanup tasks are stripping frontmatter and
# normalising code block language identifiers so CSDN's highlighter
# recognises them.
#
# Usage (single file):
#   cmtx adapt ./article.md --rule-file ./csdn.adapt.yaml --out ./output/csdn/article.md
#
# Usage (directory, all .md files):
#   cmtx adapt ./docs/ --rule-file ./csdn.adapt.yaml --out-dir ./output/csdn
#
# Rule format:
#   match   - JavaScript regex pattern (string)
#   replace - replacement string; use $1 $2 ... for capture groups
#   flags   - regex flags (default: "gm")
#             g = global (replace all matches)
#             m = multiline (^ and $ match each line)
#             s = dotAll  (. matches newlines)

version: v1

rules:
  # ----------------------------------------------------------------
  # Frontmatter
  # ----------------------------------------------------------------

  # Remove YAML frontmatter block at the top of the file.
  # flags "g" without "m" so ^ is anchored to the start of the file,
  # not the start of each line.
  - name: strip frontmatter
    match: "^---[\\s\\S]*?---\\n+"
    replace: ""
    flags: "g"

  # ----------------------------------------------------------------
  # Code block language identifiers
  #
  # Normalise short aliases to the full names that CSDN's syntax
  # highlighter (Prism / highlight.js) recognises reliably.
  # ----------------------------------------------------------------

  - name: normalize js codeblock
    match: "^```js$"
    replace: "```javascript"
    flags: "gm"

  - name: normalize ts codeblock
    match: "^```ts$"
    replace: "```typescript"
    flags: "gm"

  - name: normalize py codeblock
    match: "^```py$"
    replace: "```python"
    flags: "gm"

  - name: normalize sh codeblock
    match: "^```sh$"
    replace: "```bash"
    flags: "gm"

  - name: normalize yml codeblock
    match: "^```yml$"
    replace: "```yaml"
    flags: "gm"
