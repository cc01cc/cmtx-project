# ossutil 配置文件示例 (~/.ossutilconfig)
# 展示如何配置多个环境的 profile

[Credentials]
# ===================================================================
# 生产环境配置 (默认 profile)
# ===================================================================
language = CH

[default]
# 可选：指定特定 bucket 的 endpoint
# [Bucket-Endpoint]
# production-bucket=oss-cn-hangzhou.aliyuncs.com
# ===================================================================
# 测试环境配置
# 使用命令：ossutil --profile test [其他参数]
# ===================================================================
endpoint = oss-cn-hangzhou.aliyuncs.com
accessKeyID = **************
accessKeySecret = ******************
region=cn-hangzhou

[profile-test]
# 测试环境特定配置
# [Bucket-Endpoint]
# test-bucket=oss-cn-beijing.aliyuncs.com
# ===================================================================
# 开发环境配置
# 使用命令：ossutil --profile dev [其他参数]
# ===================================================================
endpoint = oss-cn-beijing.aliyuncs.com
accessKeyID = TEST_**************
accessKeySecret = TEST_******************
region=cn-beijing

[profile-dev]
# 开发环境特定配置
# [Bucket-Endpoint]
# dev-bucket=oss-cn-shanghai.aliyuncs.com
# ===================================================================
# 自定义域名配置 (可选)
# ===================================================================
# [Bucket-Cname]
# your-bucket-name=your-custom-domain.com
# ===================================================================
# 使用示例命令：
# ===================================================================
# 
# 1. 列出测试环境的 bucket 内容：
# ossutil --profile test ls oss://test-bucket
# 
# 2. 上传文件到开发环境：
# ossutil --profile dev cp local-file.txt oss://dev-bucket/
# 
# 3. 同步目录到测试环境：
# ossutil --profile test sync ./local-dir oss://test-bucket/remote-dir --force --delete
# 
# 4. 使用默认 (生产) 环境：
# ossutil ls oss://production-bucket
# 
# 5. 查看帮助信息：
# ossutil --help
# ossutil --profile test --help
endpoint = oss-cn-shanghai.aliyuncs.com
accessKeyID = DEV_**************
accessKeySecret = DEV_******************
region=cn-shanghai