[package]
name = "cmtx-autocorrect-wasm"
version = "0.1.0"
edition = "2021"
description = "AutoCorrect WASM bindings for CMTX"
license = "MIT OR Apache-2.0"
repository = "https://github.com/cc01cc/cmtx-project"
authors = ["cc01cc"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# 使用 git 依赖引用 autocorrect
autocorrect = { git = "https://github.com/huacnlee/autocorrect", tag = "v2.16.3" }
serde_json = "1.0"
wasm-bindgen = { version = "0.2", features = ["serde-serialize"] }

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true
