[package]
name = "cmtx-fpe-wasm"
version = "0.1.0"
edition = "2021"
description = "NIST SP 800-38G FF1 format-preserving encryption for cmtx"
license = "MIT OR Apache-2.0"
repository = "https://github.com/cc01cc/cmtx-project"
authors = ["cc01cc"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
fpe = "0.6"
aes = "0.8"
wasm-bindgen = "0.2"
js-sys = "0.3"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[profile.release]
opt-level = "s"
lto = true